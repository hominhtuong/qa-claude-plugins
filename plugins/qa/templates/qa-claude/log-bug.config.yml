# ─────────────────────────────────────────────────────────────
# qa-claude — log-bug config. EDIT this to match YOUR Lark Bitable board(s).
# Generated by the `setup` skill into  <project>/.claude/qa-claude/log-bug.config.yml
# ⚠️ Re-running `setup` (or `setup --update`) OVERWRITES this file — keep a copy of
#    your edits, or commit it. Real SECRETS (Lark app id/secret, tokens) live in ./.env,
#    never here. This file holds only non-secret board ids + mappings.
# The `log-bug` and `update-board` skills read this file.
# ─────────────────────────────────────────────────────────────

# Which board /log-bug writes to (alias must exist under `boards:` below).
active_board: staging

# Board registry — add one entry per board. IDs come from the board URL:
#   https://<domain>.larksuite.com/base/<base_id>?table=<table_id>&view=<view_id>
#   (wiki-style URL: https://<domain>.larksuite.com/wiki/<wiki_token>?table=...&view=...)
boards:
  staging:
    name: "My STG Board"
    base_id: ""          # bascn... / Verz...
    table_id: ""         # tbl...
    view_id: ""          # vew...   (optional, for building record links)
    wiki_token: ""       # optional, for wiki-style record links
    read_only: false     # true => /log-bug is BLOCKED on this board (production)
  production:
    name: "My PRD Board (read-only)"
    base_id: ""
    table_id: ""
    view_id: ""
    read_only: true      # production view — read-only, never log here

# Map each logical field to the EXACT field name on your board (rename as needed).
fields:
  name: "Name of bug"
  feature: "Tính năng"
  platform: "Platform"
  type: "Type"
  priority: "Priority"          # Severity is NOT used — Priority only
  status: "Status"
  dev_pic: "Dev PIC"
  sprint: "Sprint"
  version: "Version"
  input_action: "Input data / Action"
  expected: "Expected result"
  attachment: "Attachment"

# Option values — must match the board's option text exactly.
options:
  priority: ["Critical", "High", "Medium", "Low"]   # AI auto-picks if user omits
  type: ["Function", "UI/UX", "Performance"]
  platform: ["App", "Web", "Admin Portal", "BE"]
  status_new: "New"             # status set on a freshly logged bug

# Dev PIC mapping: name/alias (as the user types) -> Lark user open_id (ou_...).
# Find an open_id once, then keep it here so /log-bug resolves names without asking.
dev_pic:
  # "Tuong": "ou_xxxxxxxxxxxxxxxx"
  # "Hung":  "ou_yyyyyyyyyyyyyyyy"

# Status option ids per status field (only if your board needs ids, not text).
status_ids:
  # "New": "optXXXXXX"

# Defaults used when the user doesn't provide them.
defaults:
  sprint: ""
  version: ""
  platform: "App"
  test_account: ""              # appended to "Input data / Action" if set

# Platforms that do NOT attach sprint/version (continuous-deploy platforms).
skip:
  no_sprint: ["Admin Portal"]
  no_version: ["Admin Portal", "Web"]

# Run a duplicate check before creating (set false to always create).
check_duplicate: true
